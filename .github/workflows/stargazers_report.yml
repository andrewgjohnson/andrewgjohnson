name: Stargazers Report

on:
  workflow_run:
    workflows: ["Stargazers Data"]
    types: [completed]
  workflow_dispatch: # allow manual triggering

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    # Only run for a manual dispatch or a successful data run.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main # always read the latest committed data file

      - name: Generate report
        run: |
          # The report is built only from the committed data file; skip until it exists.
          if [ ! -f data/stargazers.json ]; then
            echo "::warning::data/stargazers.json not found yet; skipping report"
            exit 0
          fi

          # Rows sorted by stargazers (descending), then repository name.
          REPORT="Project|Stargazers\n-------|----------\n"
          while IFS=$'\t' read -r REPO STARGAZERS; do
            [ -z "$REPO" ] && continue
            USERNAME=$(echo "$REPO" | cut -d'/' -f1)
            REPO_NAME=$(echo "$REPO" | cut -d'/' -f2)
            REPORT+="[$USERNAME/**$REPO_NAME**](https://github.com/$REPO)|[$STARGAZERS](https://github.com/$REPO/stargazers)\n"
          done < <(jq -r '.repositories | sort_by(-.stargazers, .repository)[] | [.repository, (.stargazers|tostring)] | @tsv' data/stargazers.json)

          UNIQUE_STARGAZERS=$(jq '.uniqueStargazers' data/stargazers.json)
          REPORT+="**Unique stargazers**|**$UNIQUE_STARGAZERS**"
          echo -e "$REPORT" > STARGAZERS.md

          echo "Wrote STARGAZERS.md:"
          cat STARGAZERS.md

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add STARGAZERS.md
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update stargazers report"

          # Other workflows push to main on the same schedule, so a push can be rejected
          # if one of them committed first. Rebase onto the latest remote and retry.
          for ATTEMPT in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $ATTEMPT); rebasing on latest main and retrying"
            git pull --rebase origin main
          done
          echo "::error::Failed to push after multiple attempts"
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
