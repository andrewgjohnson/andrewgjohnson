name: Jekyll Data

on:
  schedule:
    - cron: '0 * * * *' # run hourly
  workflow_dispatch: # allow manual triggering

permissions:
  contents: write

jobs:
  fetch-jekyll-installs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch jekyll theme installs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Authenticated GitHub API GET with retries. Prints the JSON body on success
          # (HTTP 200 + valid JSON) and returns non-zero once retries are exhausted. The
          # code search API throws transient 403/429 secondary-rate-limit and 5xx errors
          # (sometimes with an empty/non-JSON body) under load, so a single bad response
          # must not be mistaken for "no results".
          #
          # On a rate-limited response GitHub tells us how long to wait, so honour that
          # rather than guessing: prefer the Retry-After header, fall back to the reset
          # time in x-ratelimit-reset, and only fall back to exponential backoff when
          # neither is present. The wait is capped so a single run can't stall forever.
          api_get() {
            local url="$1" attempt=1 max=6 code body wait reset now hdr=/tmp/api_headers.txt
            while [ "$attempt" -le "$max" ]; do
              body=$(curl -s -D "$hdr" \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "$url")
              code=$(awk 'toupper($1) ~ /^HTTP/ {c=$2} END {print c}' "$hdr")
              if [ "$code" = "200" ] && printf '%s' "$body" | jq -e . > /dev/null 2>&1; then
                printf '%s' "$body"
                return 0
              fi

              # How long to sleep before the next attempt.
              wait=$(grep -i '^retry-after:' "$hdr" | tr -dc '0-9')
              if [ -z "$wait" ]; then
                reset=$(grep -i '^x-ratelimit-reset:' "$hdr" | tr -dc '0-9')
                now=$(date +%s)
                [ -n "$reset" ] && wait=$((reset - now))
              fi
              if [ -z "$wait" ] || [ "$wait" -lt 1 ]; then
                wait=$((attempt * 30)) # no guidance from GitHub; exponential-ish backoff
              fi
              [ "$wait" -gt 120 ] && wait=120 # cap a single sleep at two minutes

              echo "GitHub API $url -> HTTP $code (attempt $attempt/$max); sleeping ${wait}s" >&2
              sleep "$wait"
              attempt=$((attempt + 1))
            done
            return 1
          }

          # The github.com website uses the regex search (per theme):
          #   /remote_theme:\s*<theme>/ -repo:<theme>
          # The REST code search API does not support regex, so we emulate it with two
          # quoted exact-match tokens (AND'd together) which tolerates the whitespace the
          # regex's \s* would have matched, and exclude the theme's own repository.
          THEMES=(
            "andrewgjohnson/open-source-documentation-jekyll-theme"
          )

          RESULTS=""
          for THEME in "${THEMES[@]}"; do
            QUERY="\"remote_theme:\" \"$THEME\" -repo:$THEME"
            ENCODED=$(jq -rn --arg q "$QUERY" '$q|@uri')

            PAGE=1
            while true; do
              # If the search cannot be fetched (e.g. sustained 429 rate limiting), skip
              # this run rather than failing: the previously committed data file is left
              # untouched, so a transient rate limit doesn't turn the workflow red.
              if ! RESPONSE=$(api_get "https://api.github.com/search/code?q=$ENCODED&per_page=100&page=$PAGE"); then
                echo "::warning::Code search failed for $THEME after retries; skipping this run and preserving the existing data."
                exit 0
              fi

              # Exclude matches inside .github/workflows (e.g. this workflow's own
              # search phrase) since those are not real theme usages.
              LINES=$(echo "$RESPONSE" | jq -r --arg theme "$THEME" '.items[] | select(.path | startswith(".github/workflows/") | not) | [.repository.full_name, $theme, .html_url] | @tsv')
              if [ -z "$LINES" ]; then
                break
              fi
              RESULTS+="$LINES"$'\n'

              COUNT=$(echo "$RESPONSE" | jq '.items | length')
              if [ "$COUNT" -lt 100 ]; then
                break
              fi
              PAGE=$((PAGE + 1))
              sleep 6 # code search API is rate limited to 10 requests/minute
            done
          done

          # Keep the first match per repository + theme pair, then sort by repo name.
          DEDUPED=$(printf "%s" "$RESULTS" | awk -F'\t' 'NF && !seen[$1 FS $2]++' | sort -t$'\t' -k1,1)

          # Build one object per theme (in THEMES order), each holding the consumer
          # projects that reference it. The url deep-links to the line in the consumer
          # repo that references the theme; pagesUrl is the published site.
          THEME_JSON_ITEMS=()
          for THEME in "${THEMES[@]}"; do
            # Rows from the deduped set that use this theme (column 2 == theme).
            THEME_ROWS=$(printf "%s\n" "$DEDUPED" | awk -F'\t' -v t="$THEME" '$2 == t')

            PROJECT_JSON_ITEMS=()
            while IFS=$'\t' read -r REPO ROW_THEME URL; do
              [ -z "$REPO" ] && continue
              USERNAME=$(echo "$REPO" | cut -d'/' -f1)
              REPO_NAME=$(echo "$REPO" | cut -d'/' -f2)

              # Link the URL to the repository's GitHub Pages site. The Pages API returns
              # the exact published URL (html_url), which already reflects a custom domain
              # set via a root CNAME. If Pages info is unavailable, fall back to the
              # default *.github.io URL: a user/org site (repo named <user>.github.io) lives
              # at the domain root, everything else under the /<repo> project path.
              PAGES_URL=$(curl -s \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/$REPO/pages" | jq -r '.html_url // empty')
              if [ -z "$PAGES_URL" ]; then
                USERNAME_LC=$(echo "$USERNAME" | tr '[:upper:]' '[:lower:]')
                REPO_NAME_LC=$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]')
                if [ "$REPO_NAME_LC" = "$USERNAME_LC.github.io" ]; then
                  PAGES_URL="https://$USERNAME_LC.github.io/"
                else
                  PAGES_URL="https://$USERNAME_LC.github.io/$REPO_NAME/"
                fi
              fi

              # The code search html_url is pinned to the indexed commit SHA
              # (.../blob/<sha>/...). Rewrite it to the repo's default branch for a clean,
              # live link. Fall back to the original (SHA) URL if the branch is unknown.
              DEFAULT_BRANCH=$(curl -s \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/$REPO" | jq -r '.default_branch // empty')
              if [ -n "$DEFAULT_BRANCH" ]; then
                URL=$(echo "$URL" | sed -E "s#(/blob/)[^/]+/#\1$DEFAULT_BRANCH/#")
              fi

              # Fetch the raw file at that same ref and find the matching line so the
              # deep-link anchor (e.g. .../_config.yml#L7) matches the live content.
              RAW_URL=$(echo "$URL" | sed -e 's#https://github.com/#https://raw.githubusercontent.com/#' -e 's#/blob/#/#')
              LINE=$(curl -sL -H "Authorization: token $GITHUB_TOKEN" "$RAW_URL" | grep -n -m1 -E "remote_theme:[[:space:]]*$THEME" | cut -d':' -f1)
              if [ -n "$LINE" ]; then
                URL="$URL#L$LINE"
              fi

              PROJECT=$(jq -n \
                --arg repository "$REPO" \
                --arg url "$URL" \
                --arg pagesUrl "$PAGES_URL" \
                '{repository: $repository, url: $url, pagesUrl: $pagesUrl}')
              PROJECT_JSON_ITEMS+=("$PROJECT")
            done <<< "$THEME_ROWS"

            if [ ${#PROJECT_JSON_ITEMS[@]} -gt 0 ]; then
              PROJECTS=$(printf '%s\n' "${PROJECT_JSON_ITEMS[@]}" | jq -s 'sort_by(.repository)')
            else
              PROJECTS='[]'
            fi
            THEME_ITEM=$(jq -n \
              --arg theme "$THEME" \
              --argjson projects "$PROJECTS" \
              '{theme: $theme, projects: $projects}')
            THEME_JSON_ITEMS+=("$THEME_ITEM")
          done

          mkdir -p data
          printf '%s\n' "${THEME_JSON_ITEMS[@]}" | jq -s \
            '{themes: .}' > data/jekyll.json

          echo "Wrote data/jekyll.json:"
          cat data/jekyll.json

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/jekyll.json
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update jekyll data"

          # The other data workflows run on the same hourly cron and also push to main,
          # so a push can be rejected if one of them committed first. Rebase onto the
          # latest remote and retry a few times before giving up.
          for ATTEMPT in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $ATTEMPT); rebasing on latest main and retrying"
            git pull --rebase origin main
          done
          echo "::error::Failed to push after multiple attempts"
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
