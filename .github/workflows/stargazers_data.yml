name: Stargazers Data

on:
  schedule:
    - cron: '0 * * * *' # run hourly
  workflow_dispatch: # allow manual triggering

permissions:
  contents: write

jobs:
  fetch-stargazers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch stargazers total
        run: |
          REPOS=(
            "agjgd/agjgd"
            "agjjQuery/agjjQuery"
            "agjjQuery/coding-style"
            "andrewgjohnson/agjCalendar"
            "andrewgjohnson/agjVersionless"
            "andrewgjohnson/andrewgjohnson"
            "andrewgjohnson/eslint-config-google-jsdocless"
            "andrewgjohnson/imageblendedcolorallocate"
            "andrewgjohnson/imagecolorallocatefromstring"
            "andrewgjohnson/imagegradientrectangle"
            "andrewgjohnson/imagettftextblur"
            "andrewgjohnson/imagettftextgradient"
            "andrewgjohnson/linebreaks4imagettftext"
            "andrewgjohnson/open-source-documentation-jekyll-theme"
            "andrewgjohnson/www.andrewgjohnson.com"
            "createtoconvert/www.createtoconvert.com"
          )
          UNIQUE_IDS=()
          REPO_STARGAZERS=()

          for REPO in "${REPOS[@]}"; do
            PAGE=1
            STARGAZERS=0
            while true; do
              RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/$REPO/stargazers?per_page=100&page=$PAGE")
              if echo $RESPONSE | jq -e 'type == "array"' > /dev/null; then
                IDS=$(echo $RESPONSE | jq '.[].id')
                if [ -z "$IDS" ]; then
                  break
                fi
                for ID in $IDS; do
                  STARGAZERS=$((STARGAZERS + 1))
                  if [[ ! " ${UNIQUE_IDS[@]} " =~ " ${ID} " ]]; then
                    UNIQUE_IDS+=("$ID")
                  fi
                done
                if [ $(echo $RESPONSE | jq '. | length') -lt 5 ]; then
                  break
                fi
                PAGE=$((PAGE + 1))
              else
                echo "Error or no stargazers found for $REPO"
                break
              fi
            done
            REPO_STARGAZERS+=("$REPO $STARGAZERS")
          done

          # Sort REPO_STARGAZERS array by repository name (first field)
          IFS=$'\n' SORTED_REPO_STARGAZERS=($(sort -k1,1 <<<"${REPO_STARGAZERS[*]}"))
          unset IFS

          # Build a JSON array of per-repo objects
          REPO_JSON_ITEMS=()
          for ENTRY in "${SORTED_REPO_STARGAZERS[@]}"; do
            REPO=$(echo $ENTRY | awk '{print $1}')
            STARGAZERS=$(echo $ENTRY | awk '{print $2}')
            ITEM=$(jq -n \
              --arg repository "$REPO" \
              --argjson stargazers "$STARGAZERS" \
              '{repository: $repository, stargazers: $stargazers}')
            REPO_JSON_ITEMS+=("$ITEM")
          done

          UNIQUE_STARGAZERS=${#UNIQUE_IDS[@]}

          mkdir -p data
          printf '%s\n' "${REPO_JSON_ITEMS[@]}" | jq -s \
            --argjson unique "$UNIQUE_STARGAZERS" \
            '{repositories: ., uniqueStargazers: $unique}' > data/stargazers.json

          echo "Wrote data/stargazers.json:"
          cat data/stargazers.json

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/stargazers.json
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update stargazers data"

          # The other data workflows run on the same hourly cron and also push to main,
          # so a push can be rejected if one of them committed first. Rebase onto the
          # latest remote and retry a few times before giving up.
          for ATTEMPT in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $ATTEMPT); rebasing on latest main and retrying"
            git pull --rebase origin main
          done
          echo "::error::Failed to push after multiple attempts"
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
