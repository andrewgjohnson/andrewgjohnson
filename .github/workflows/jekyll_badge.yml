name: Jekyll Badge

on:
  workflow_run:
    workflows: ["Jekyll Data"]
    types: [completed]
  workflow_dispatch: # allow manual triggering

permissions:
  contents: write

jobs:
  build-badge:
    runs-on: ubuntu-latest
    # Only run for a manual dispatch or a successful data run.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main # always read the latest committed data file

      - name: Build jekyll installs badge
        run: |
          # Total installs is the number of consumer projects across all themes.
          TOTAL=$(jq '[.themes[].projects[]] | length' data/jekyll.json)

          BADGE_URL="https://raster.shields.io/badge/installs-${TOTAL}-0969da.png?colorA=1f2823&colorB=0969da&style=flat-square&logoColor=white&logo=jekyll"
          echo "Downloading badge from URL: $BADGE_URL"
          mkdir -p badges
          curl -L "$BADGE_URL" -o badges/jekyll.png

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add badges/jekyll.png
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update jekyll badge"

          # Other workflows push to main on the same schedule, so a push can be rejected
          # if one of them committed first. Rebase onto the latest remote and retry.
          for ATTEMPT in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $ATTEMPT); rebasing on latest main and retrying"
            git pull --rebase origin main
          done
          echo "::error::Failed to push after multiple attempts"
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
